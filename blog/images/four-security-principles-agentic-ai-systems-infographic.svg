<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="900" fill="#05020d"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1525" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="900" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="bold" fill="white">Four Security Principles for Agentic AI Systems</text>
  <text x="450" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#a855f7">Building Trust in Autonomous Intelligence</text>
  
  <!-- Connecting arrows -->
  <g stroke="#a855f7" stroke-width="2" fill="none" opacity="0.4" filter="url(#glow1)">
    <!-- Horizontal arrows -->
    <path d="M 420 280 L 480 280" marker-end="url(#arrowhead)"/>
    <path d="M 420 580 L 480 580" marker-end="url(#arrowhead)"/>
    <!-- Vertical arrows -->
    <path d="M 230 420 L 230 460" marker-end="url(#arrowhead)"/>
    <path d="M 670 420 L 670 460" marker-end="url(#arrowhead)"/>
    <!-- Diagonal connections -->
    <path d="M 400 400 Q 450 430 500 400" stroke="#00e0ff" opacity="0.3"/>
    <path d="M 400 500 Q 450 470 500 500" stroke="#00e0ff" opacity="0.3"/>
  </g>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>
  
  <!-- Card 1: Trust Boundaries -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#a855f7" stroke-width="2"/>
    <!-- Shield icon -->
    <path d="M 50 30 L 70 38 L 70 55 C 70 68 50 78 50 78 C 50 78 30 68 30 55 L 30 38 Z" fill="none" stroke="#a855f7" stroke-width="2"/>
    <path d="M 42 52 L 48 58 L 60 46" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="11" fill="#a855f7" font-weight="bold">PRINCIPLE 01</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Trust Boundaries</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
      <tspan x="20" dy="0">Establish explicit trust boundaries with</tspan>
      <tspan x="20" dy="22">unique agent identities. Define clear</tspan>
      <tspan x="20" dy="22">perimeters for each autonomous system</tspan>
      <tspan x="20" dy="22">to prevent unauthorized lateral movement</tspan>
      <tspan x="20" dy="22">and maintain accountability.</tspan>
    </text>
    <!-- Decorative elements -->
    <rect x="20" y="240" width="60" height="4" rx="2" fill="#a855f7" opacity="0.6"/>
    <rect x="90" y="240" width="30" height="4" rx="2" fill="#00e0ff" opacity="0.4"/>
  </g>
  
  <!-- Card 2: Least Privilege -->
  <g transform="translate(470, 120)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <!-- Key/Lock icon -->
    <circle cx="45" cy="42" r="10" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <path d="M 52 49 L 65 62 L 65 68 L 60 68 L 60 63 L 55 63 L 55 58" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <path d="M 38 48 L 32 54" stroke="#a855f7" stroke-width="2"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff" font-weight="bold">PRINCIPLE 02</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Least Privilege</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
      <tspan x="20" dy="0">Implement context-aware least privilege</tspan>
      <tspan x="20" dy="22">with just-in-time provisioning. Grant</tspan>
      <tspan x="20" dy="22">minimal permissions dynamically based</tspan>
      <tspan x="20" dy="22">on task requirements and revoke access</tspan>
      <tspan x="20" dy="22">immediately upon completion.</tspan>
    </text>
    <rect x="20" y="240" width="60" height="4" rx="2" fill="#00e0ff" opacity="0.6"/>
    <rect x="90" y="240" width="30" height="4" rx="2" fill="#a855f7" opacity="0.4"/>
  </g>
  
  <!-- Card 3: Human Oversight -->
  <g transform="translate(50, 440)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <!-- Eye/Oversight icon -->
    <ellipse cx="50" cy="50" rx="20" ry="12" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <circle cx="50" cy="50" r="6" fill="#00e0ff"/>
    <circle cx="50" cy="50" r="3" fill="#05020d"/>
    <path d="M 30 38 Q 50 25 70 38" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <path d="M 30 62 Q 50 75 70 62" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff" font-weight="bold">PRINCIPLE 03</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Human Oversight</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
      <tspan x="20" dy="0">Maintain meaningful human oversight</tspan>
      <tspan x="20" dy="22">through tiered autonomy levels. Ensure</tspan>
      <tspan x="20" dy="22">humans remain in the loop for critical</tspan>
      <tspan x="20" dy="22">decisions while enabling efficiency for</tspan>
      <tspan x="20" dy="22">routine operations.</tspan>
    </text>
    <rect x="20" y="240" width="60" height="4" rx="2" fill="#00e0ff" opacity="0.6"/>
    <rect x="90" y="240" width="30" height="4" rx="2" fill="#a855f7" opacity="0.4"/>
  </g>
  
  <!-- Card 4: Audit Trails -->
  <g transform="translate(470, 440)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#a855f7" stroke-width="2"/>
    <!-- Document/Audit icon -->
    <rect x="35" y="32" width="25" height="32" rx="2" fill="none" stroke="#a855f7" stroke-width="2"/>
    <path d="M 40 42 L 55 42" stroke="#00e0ff" stroke-width="1.5"/>
    <path d="M 40 48 L 55 48" stroke="#00e0ff" stroke-width="1.5"/>
    <path d="M 40 54 L 50 54" stroke="#00e0ff" stroke-width="1.5"/>
    <path d="M 55 32 L 55 40 L 60 40" fill="none" stroke="#a855f7" stroke-width="1.5"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="11" fill="#a855f7" font-weight="bold">PRINCIPLE 04</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Audit Trails</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
      <tspan x="20" dy="0">Embed comprehensive audit trails that</tspan>
      <tspan x="20" dy="22">capture full decision context. Record</tspan>
      <tspan x="20" dy="22">all agent actions, reasoning chains, and</tspan>
      <tspan x="20" dy="22">data access for forensic analysis and</tspan>
      <tspan x="20" dy="22">compliance verification.</tspan>
    </text>
    <rect x="20" y="240" width="60" height="4" rx="2" fill="#a855f7" opacity="0.6"/>
    <rect x="90" y="240" width="30" height="4" rx="2" fill="#00e0ff" opacity="0.4"/>
  </g>
  
  <!-- Central connecting element -->
  <g transform="translate(450, 430)">
    <circle cx="0" cy="0" r="25" fill="#05020d" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
    <path d="M -8 -8 L 8 8 M -8 8 L 8 -8" stroke="#00e0ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#a855f7"/>
  </g>
  
  <!-- Tag pills at bottom -->
  <g transform="translate(450, 800)">
    <rect x="-280" y="0" width="170" height="32" rx="16" fill="none" stroke="#a855f7" stroke-width="1.5" filter="url(#glow1)"/>
    <text x="-195" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a855f7">Agentic AI Security</text>
    
    <rect x="-95" y="0" width="190" height="32" rx="16" fill="none" stroke="#00e0ff" stroke-width="1.5" filter="url(#glow1)"/>
    <text x="0" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#00e0ff">Zero Trust Architecture</text>
    
    <rect x="110" y="0" width="145" height="32" rx="16" fill="none" stroke="#a855f7" stroke-width="1.5" filter="url(#glow1)"/>
    <text x="182" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a855f7">AI Governance</text>
  </g>
  
  <!-- Decorative corner elements -->
  <path d="M 20 20 L 20 60 M 20 20 L 60 20" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
  <path d="M 880 20 L 880 60 M 880 20 L 840 20" stroke="#00e0ff" stroke-width="2" opacity="0.5"/>
  <path d="M 20 880 L 20 840 M 20 880 L 60 880" stroke="#00e0ff" stroke-width="2" opacity="0.5"/>
  <path d="M 880 880 L 880 840 M 880 880 L 840 880" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
  
  <!-- Floating particles -->
  <circle cx="120" cy="850" r="2" fill="#a855f7" opacity="0.6"/>
  <circle cx="780" cy="100" r="3" fill="#00e0ff" opacity="0.5"/>
  <circle cx="850" cy="450" r="2" fill="#a855f7" opacity="0.4"/>
  <circle cx="50" cy="400" r="2" fill="#00e0ff" opacity="0.5"/>
  
  <!-- Bottom line accent -->
  <line x1="100" y1="860" x2="800" y2="860" stroke="url(#grad1)" stroke-width="1" opacity="0.3"/>
</svg>