<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="900" fill="#05020d"/>
  
  <text x="450" y="55" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="26" font-weight="bold">Four Security Principles for Agentic AI Systems</text>
  <text x="450" y="85" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16">Building Trust in Autonomous Enterprise Workflows</text>
  
  <!-- Connecting arrows -->
  <path d="M420 320 L480 320" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)" marker-end="url(#arrow1)"/>
  <path d="M420 580 L480 580" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <path d="M230 420 L230 460" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <path d="M670 420 L670 460" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  
  <!-- Card 1 - Top Left -->
  <rect x="50" y="130" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
  <circle cx="90" cy="170" r="24" fill="none" stroke="#a855f7" stroke-width="2"/>
  <path d="M80 170 L100 170 M90 160 L90 180 M85 165 L95 165 M85 175 L95 175" stroke="#a855f7" stroke-width="2" fill="none"/>
  <path d="M90 155 L90 145 M90 195 L90 185" stroke="#a855f7" stroke-width="1.5" fill="none"/>
  <text x="130" y="178" fill="white" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Least Privilege</text>
  <text x="70" y="220" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
    <tspan x="70" dy="0">Implement least privilege with</tspan>
    <tspan x="70" dy="22">just-in-time permission elevation.</tspan>
    <tspan x="70" dy="22">Grant minimal access rights and</tspan>
    <tspan x="70" dy="22">elevate only when necessary for</tspan>
    <tspan x="70" dy="22">specific autonomous operations.</tspan>
  </text>
  <text x="70" y="380" fill="#a855f7" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">JIT ACCESS</text>
  
  <!-- Card 2 - Top Right -->
  <rect x="470" y="130" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow2)"/>
  <path d="M510 155 L530 175 L510 195 M530 155 L550 175 L530 195" stroke="#00e0ff" stroke-width="2" fill="none"/>
  <circle cx="520" cy="175" r="5" fill="#00e0ff"/>
  <text x="570" y="178" fill="white" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Continuous Verification</text>
  <text x="490" y="220" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
    <tspan x="490" dy="0">Continuous verification must include</tspan>
    <tspan x="490" dy="22">both identity and intent validation.</tspan>
    <tspan x="490" dy="22">Verify not just who is acting, but</tspan>
    <tspan x="490" dy="22">what they intend to accomplish</tspan>
    <tspan x="490" dy="22">at every decision point.</tspan>
  </text>
  <text x="490" y="380" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">IDENTITY + INTENT</text>
  
  <!-- Card 3 - Bottom Left -->
  <rect x="50" y="450" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow2)"/>
  <rect x="75" y="485" width="40" height="30" rx="4" fill="none" stroke="#00e0ff" stroke-width="2"/>
  <rect x="80" y="490" width="30" height="20" rx="2" fill="none" stroke="#00e0ff" stroke-width="1"/>
  <path d="M85 500 L100 500 M85 505 L95 505" stroke="#00e0ff" stroke-width="1" fill="none"/>
  <text x="130" y="508" fill="white" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Bounded Autonomy</text>
  <text x="70" y="550" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
    <tspan x="70" dy="0">Bounded autonomy requires multi-</tspan>
    <tspan x="70" dy="22">layer guardrails at model, agent,</tspan>
    <tspan x="70" dy="22">and system levels. Define clear</tspan>
    <tspan x="70" dy="22">operational boundaries and enforce</tspan>
    <tspan x="70" dy="22">them through layered controls.</tspan>
  </text>
  <text x="70" y="700" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">MULTI-LAYER GUARDRAILS</text>
  
  <!-- Card 4 - Bottom Right -->
  <rect x="470" y="450" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
  <circle cx="520" cy="500" r="18" fill="none" stroke="#a855f7" stroke-width="2"/>
  <path d="M512 500 L520 508 L532 492" stroke="#a855f7" stroke-width="2" fill="none"/>
  <path d="M520 482 L520 475 M520 518 L520 525 M502 500 L495 500 M538 500 L545 500" stroke="#a855f7" stroke-width="1.5" fill="none"/>
  <text x="555" y="508" fill="white" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">Complete Observability</text>
  <text x="490" y="550" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
    <tspan x="490" dy="0">Complete observability demands full</tspan>
    <tspan x="490" dy="22">decision chain transparency. Track</tspan>
    <tspan x="490" dy="22">every action, decision, and data</tspan>
    <tspan x="490" dy="22">access with immutable audit trails</tspan>
    <tspan x="490" dy="22">for forensics and compliance.</tspan>
  </text>
  <text x="490" y="700" fill="#a855f7" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">DECISION CHAIN TRANSPARENCY</text>
  
  <!-- Connecting arrows with arrowheads -->
  <polygon points="478,316 468,320 478,324" fill="#a855f7"/>
  <polygon points="478,576 468,580 478,584" fill="#00e0ff"/>
  <polygon points="226,458 230,468 234,458" fill="#a855f7"/>
  <polygon points="666,458 670,468 674,458" fill="#00e0ff"/>
  
  <!-- Center diamond connector -->
  <polygon points="450,400 470,420 450,440 430,420" fill="none" stroke="#a855f7" stroke-width="2" filter="url(#glow1)"/>
  <polygon points="450,400 470,420 450,440 430,420" fill="#05020d"/>
  <circle cx="450" cy="420" r="8" fill="#a855f7" opacity="0.5"/>
  
  <!-- Tag pills -->
  <rect x="280" y="780" width="100" height="28" rx="14" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <text x="330" y="799" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="12">agentic-ai</text>
  
  <rect x="395" y="780" width="100" height="28" rx="14" fill="none" stroke="#00e0ff" stroke-width="1.5"/>
  <text x="445" y="799" text-anchor="middle" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="12">ai-security</text>
  
  <rect x="510" y="780" width="100" height="28" rx="14" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <text x="560" y="799" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="12">zero-trust</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="850" r="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="70" cy="855" r="2" fill="#00e0ff" opacity="0.5"/>
  <circle cx="830" cy="850" r="3" fill="#00e0ff" opacity="0.5"/>
  <circle cx="850" cy="845" r="2" fill="#a855f7" opacity="0.5"/>
  
  <!-- Bottom line -->
  <line x1="100" y1="870" x2="800" y2="870" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
  <text x="450" y="890" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" opacity="0.6">Enterprise Security Framework for Autonomous AI Systems</text>
</svg>