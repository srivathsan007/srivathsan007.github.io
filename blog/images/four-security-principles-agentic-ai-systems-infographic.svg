<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="900" fill="#05020d"/>
  
  <text x="450" y="55" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="26" font-weight="bold">Four Security Principles for Agentic AI Systems:</text>
  <text x="450" y="85" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="20" font-weight="600">A Cloud Architect's Implementation Guide</text>
  
  <!-- Connecting Arrows -->
  <path d="M435 340 L465 340" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)" marker-end="url(#arrowhead)"/>
  <path d="M435 600 L465 600" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <path d="M230 425 L230 455" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <path d="M670 425 L670 455" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  
  <!-- Card 1 - Top Left -->
  <rect x="40" y="130" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
  <circle cx="80" cy="170" r="24" fill="none" stroke="#a855f7" stroke-width="2"/>
  <path d="M70 170 L90 170 M80 160 L80 180 M68 158 L92 182 M92 158 L68 182" stroke="#a855f7" stroke-width="2" fill="none"/>
  <text x="115" y="178" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">1. Trust Boundaries</text>
  <text x="60" y="220" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Explicit, Immutable Trust</text>
  <text x="60" y="250" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Agentic AI systems require explicit,</text>
  <text x="60" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">immutable trust boundaries. Define clear</text>
  <text x="60" y="290" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">separation between AI agents, data stores,</text>
  <text x="60" y="310" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">and external services. Use cryptographic</text>
  <text x="60" y="330" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">attestation for boundary enforcement.</text>
  <rect x="60" y="360" width="80" height="24" rx="4" fill="#a855f7" fill-opacity="0.2" stroke="#a855f7" stroke-width="1"/>
  <text x="100" y="376" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="10">CRITICAL</text>
  
  <!-- Card 2 - Top Right -->
  <rect x="480" y="130" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow2)"/>
  <path d="M510 160 L540 160 L540 190 L510 190 Z" fill="none" stroke="#00e0ff" stroke-width="2"/>
  <path d="M525 150 L525 160 M515 155 L535 155" stroke="#00e0ff" stroke-width="2"/>
  <circle cx="525" cy="175" r="6" fill="#00e0ff"/>
  <text x="555" y="178" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">2. Dynamic Least Privilege</text>
  <text x="500" y="220" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Just-In-Time Permissions</text>
  <text x="500" y="250" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Implement dynamic least privilege using</text>
  <text x="500" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">just-in-time permissions. Grant temporary</text>
  <text x="500" y="290" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">elevated access based on task context,</text>
  <text x="500" y="310" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">with automatic revocation upon completion.</text>
  <text x="500" y="330" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Integrate with Azure Entra ID PIM.</text>
  <rect x="500" y="360" width="60" height="24" rx="4" fill="#00e0ff" fill-opacity="0.2" stroke="#00e0ff" stroke-width="1"/>
  <text x="530" y="376" text-anchor="middle" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="10">HIGH</text>
  
  <!-- Card 3 - Bottom Left -->
  <rect x="40" y="470" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow2)"/>
  <path d="M60 510 L100 510 L100 530 L60 530 Z" fill="none" stroke="#00e0ff" stroke-width="2"/>
  <path d="M70 520 L90 520" stroke="#00e0ff" stroke-width="2"/>
  <path d="M80 505 L80 495 L95 495" stroke="#00e0ff" stroke-width="2"/>
  <circle cx="80" cy="540" r="8" fill="none" stroke="#00e0ff" stroke-width="2"/>
  <text x="115" y="525" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">3. Behavioral Verification</text>
  <text x="60" y="565" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Prompt Injection Detection</text>
  <text x="60" y="595" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Continuous behavioral verification must</text>
  <text x="60" y="615" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">detect prompt injection attacks. Monitor</text>
  <text x="60" y="635" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">for anomalous patterns, implement output</text>
  <text x="60" y="655" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">validation, and deploy real-time threat</text>
  <text x="60" y="675" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">detection using Azure AI Content Safety.</text>
  <rect x="60" y="700" width="90" height="24" rx="4" fill="#00e0ff" fill-opacity="0.2" stroke="#00e0ff" stroke-width="1"/>
  <text x="105" y="716" text-anchor="middle" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="10">REAL-TIME</text>
  
  <!-- Card 4 - Bottom Right -->
  <rect x="480" y="470" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
  <path d="M510 500 L540 500 L540 540 L510 540 Z" fill="none" stroke="#a855f7" stroke-width="2"/>
  <path d="M515 510 L535 510 M515 520 L535 520 M515 530 L530 530" stroke="#a855f7" stroke-width="1.5"/>
  <text x="555" y="525" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">4. Comprehensive Auditability</text>
  <text x="500" y="565" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Three-Tier Logging Architecture</text>
  <text x="500" y="595" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Comprehensive auditability requires</text>
  <text x="500" y="615" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">three-tier logging: intent capture,</text>
  <text x="500" y="635" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">execution traces, and outcome validation.</text>
  <text x="500" y="655" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Leverage Azure Monitor and Sentinel for</text>
  <text x="500" y="675" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">centralized analysis and compliance.</text>
  <rect x="500" y="700" width="100" height="24" rx="4" fill="#a855f7" fill-opacity="0.2" stroke="#a855f7" stroke-width="1"/>
  <text x="550" y="716" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="10">COMPLIANCE</text>
  
  <!-- Arrow indicators -->
  <path d="M435 340 L455 340" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <polygon points="455,335 465,340 455,345" fill="#a855f7"/>
  
  <path d="M435 600 L455 600" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <polygon points="455,595 465,600 455,605" fill="#00e0ff"/>
  
  <path d="M230 410 L230 450" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <polygon points="225,450 230,465 235,450" fill="#a855f7"/>
  
  <path d="M670 410 L670 450" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <polygon points="665,450 670,465 675,450" fill="#00e0ff"/>
  
  <!-- Tag Pills -->
  <rect x="200" y="810" width="150" height="32" rx="16" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1" filter="url(#glow1)"/>
  <text x="275" y="831" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Agentic AI Security</text>
  
  <rect x="370" y="810" width="120" height="32" rx="16" fill="#00e0ff" fill-opacity="0.15" stroke="#00e0ff" stroke-width="1" filter="url(#glow1)"/>
  <text x="430" y="831" text-anchor="middle" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Azure OpenAI</text>
  
  <rect x="510" y="810" width="120" height="32" rx="16" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1" filter="url(#glow1)"/>
  <text x="570" y="831" text-anchor="middle" fill="#a855f7" font-family="system-ui, sans-serif" font-size="12" font-weight="500">AI Governance</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="850" cy="50" r="3" fill="#00e0ff" opacity="0.5"/>
  <circle cx="50" cy="850" r="3" fill="#00e0ff" opacity="0.5"/>
  <circle cx="850" cy="850" r="3" fill="#a855f7" opacity="0.5"/>
  
  <line x1="30" y1="100" x2="870" y2="100" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="790" x2="870" y2="790" stroke="#00e0ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Shield icon watermark -->
  <path d="M450 870 L450 880 Q450 885 455 888 L460 890 Q465 888 465 883 L465 870 Q457.5 865 450 870 Z" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
</svg>