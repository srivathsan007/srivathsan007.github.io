<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00e0ff" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e0ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="900" fill="#05020d"/>
  
  <text x="450" y="55" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Four Security Principles for Agentic AI Systems:</text>
  <text x="450" y="90" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#a855f7" text-anchor="middle">Building Trust in Autonomous Intelligence</text>
  
  <!-- Card 1 - Top Left -->
  <rect x="50" y="130" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
  <circle cx="90" cy="175" r="28" fill="none" stroke="#a855f7" stroke-width="2"/>
  <path d="M80 175 L100 175 M90 165 L90 185 M82 168 L98 182 M82 182 L98 168" stroke="#a855f7" stroke-width="2" fill="none"/>
  <path d="M85 190 L95 190 L100 200 L90 205 L80 200 Z" fill="#a855f7" opacity="0.5"/>
  <text x="130" y="180" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="white">Cryptographic Identity</text>
  <text x="70" y="230" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
    <tspan x="70" dy="0">AI agents require cryptographically</tspan>
    <tspan x="70" dy="22">verifiable identities with unique keys</tspan>
    <tspan x="70" dy="22">and certificates to establish trust</tspan>
    <tspan x="70" dy="22">and enable secure authentication</tspan>
    <tspan x="70" dy="22">across distributed systems.</tspan>
  </text>
  
  <!-- Card 2 - Top Right -->
  <rect x="470" y="130" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow3)"/>
  <rect x="485" y="155" width="40" height="50" rx="4" fill="none" stroke="#00e0ff" stroke-width="2"/>
  <path d="M495 175 L515 175 M495 185 L515 185 M495 195 L505 195" stroke="#00e0ff" stroke-width="2"/>
  <path d="M520 165 L530 175 L520 185" stroke="#00e0ff" stroke-width="2" fill="none"/>
  <text x="550" y="180" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="white">Dynamic Permissions</text>
  <text x="490" y="230" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
    <tspan x="490" dy="0">Implement just-in-time, just-enough</tspan>
    <tspan x="490" dy="22">permissions that dynamically adjust</tspan>
    <tspan x="490" dy="22">based on context, risk assessment,</tspan>
    <tspan x="490" dy="22">and operational requirements for</tspan>
    <tspan x="490" dy="22">minimal privilege exposure.</tspan>
  </text>
  
  <!-- Card 3 - Bottom Left -->
  <rect x="50" y="450" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow3)"/>
  <rect x="72" y="480" width="50" height="35" rx="3" fill="none" stroke="#00e0ff" stroke-width="2"/>
  <path d="M80 490 L115 490 M80 500 L110 500 M80 510 L105 510" stroke="#00e0ff" stroke-width="1.5"/>
  <path d="M97 520 L97 530 L107 530" stroke="#00e0ff" stroke-width="2" fill="none"/>
  <circle cx="112" cy="530" r="5" fill="#00e0ff" opacity="0.5"/>
  <text x="135" y="502" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="white">Immutable Audit Logs</text>
  <text x="70" y="550" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
    <tspan x="70" dy="0">Capture chain-of-thought reasoning</tspan>
    <tspan x="70" dy="22">in immutable logs to enable complete</tspan>
    <tspan x="70" dy="22">forensic analysis, compliance audits,</tspan>
    <tspan x="70" dy="22">and transparent decision tracking</tspan>
    <tspan x="70" dy="22">for accountability.</tspan>
  </text>
  
  <!-- Card 4 - Bottom Right -->
  <rect x="470" y="450" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
  <circle cx="510" cy="495" r="20" fill="none" stroke="#a855f7" stroke-width="2"/>
  <circle cx="510" cy="490" r="6" fill="#a855f7"/>
  <path d="M500 502 L510 510 L520 502" stroke="#a855f7" stroke-width="2" fill="none"/>
  <path d="M495 515 L510 505 L525 515" stroke="#a855f7" stroke-width="2" fill="none"/>
  <text x="545" y="502" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="white">Human Oversight Tiers</text>
  <text x="490" y="550" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">
    <tspan x="490" dy="0">Design tiered human oversight</tspan>
    <tspan x="490" dy="22">workflows where autonomy scales</tspan>
    <tspan x="490" dy="22">with demonstrated reliability and</tspan>
    <tspan x="490" dy="22">risk tolerance, maintaining human</tspan>
    <tspan x="490" dy="22">control over critical decisions.</tspan>
  </text>
  
  <!-- Connecting Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00e0ff"/>
    </marker>
  </defs>
  
  <!-- Horizontal arrow top -->
  <path d="M435 270 L465 270" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow1)"/>
  
  <!-- Horizontal arrow bottom -->
  <path d="M435 590 L465 590" stroke="#00e0ff" stroke-width="2" marker-end="url(#arrowhead2)" filter="url(#glow1)"/>
  
  <!-- Vertical arrow left -->
  <path d="M240 415 L240 445" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowhead)" filter="url(#glow1)"/>
  
  <!-- Vertical arrow right -->
  <path d="M660 415 L660 445" stroke="#00e0ff" stroke-width="2" marker-end="url(#arrowhead2)" filter="url(#glow1)"/>
  
  <!-- Diagonal arrows -->
  <path d="M420 400 L480 460" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <path d="M480 400 L420 460" stroke="#00e0ff" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  
  <!-- Center connection circle -->
  <circle cx="450" cy="430" r="15" fill="#05020d" stroke="#a855f7" stroke-width="1.5" filter="url(#glow2)"/>
  <circle cx="450" cy="430" r="8" fill="#a855f7" opacity="0.3"/>
  <circle cx="450" cy="430" r="4" fill="#00e0ff"/>
  
  <!-- Tag Pills -->
  <rect x="145" y="780" width="180" height="36" rx="18" fill="none" stroke="#a855f7" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="235" y="803" font-family="system-ui, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle">Agentic AI Security</text>
  
  <rect x="355" y="780" width="190" height="36" rx="18" fill="none" stroke="#00e0ff" stroke-width="1.5" filter="url(#glow3)"/>
  <text x="450" y="803" font-family="system-ui, sans-serif" font-size="13" fill="#00e0ff" text-anchor="middle">Zero Trust Architecture</text>
  
  <rect x="575" y="780" width="160" height="36" rx="18" fill="none" stroke="#a855f7" stroke-width="1.5" filter="url(#glow2)"/>
  <text x="655" y="803" font-family="system-ui, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle">AI Governance</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="850" r="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="70" cy="855" r="2" fill="#00e0ff" opacity="0.5"/>
  <circle cx="830" cy="850" r="3" fill="#00e0ff" opacity="0.5"/>
  <circle cx="850" cy="845" r="2" fill="#a855f7" opacity="0.5"/>
  
  <!-- Subtle grid lines -->
  <line x1="450" y1="120" x2="450" y2="130" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="730" x2="450" y2="760" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
</svg>