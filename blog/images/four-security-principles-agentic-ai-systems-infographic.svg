<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e0ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#05020d;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="900" fill="#05020d"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a1525" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="900" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Title -->
  <text x="450" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">Four Security Principles for Agentic AI Systems</text>
  <text x="450" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a855f7" text-anchor="middle">A Cloud Architect's Framework</text>
  
  <!-- Connecting arrows -->
  <path d="M 435 380 L 465 380" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)" marker-end="url(#arrowhead)"/>
  <path d="M 435 600 L 465 600" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <path d="M 230 420 L 230 460" stroke="#a855f7" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <path d="M 670 420 L 670 460" stroke="#00e0ff" stroke-width="2" fill="none" filter="url(#glow1)"/>
  <path d="M 340 490 L 560 490" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,5" fill="none" opacity="0.5"/>
  
  <!-- Card 1: Task-specific permissions -->
  <g transform="translate(40, 130)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="28" fill="none" stroke="#a855f7" stroke-width="2"/>
    <path d="M 40 45 L 50 35 L 60 45 M 50 35 L 50 65 M 35 55 L 35 65 L 65 65 L 65 55" stroke="#a855f7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#a855f7" font-weight="bold">PRINCIPLE 1</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Task-Specific Permissions</text>
    <text x="20" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Agentic AI systems require task-specific</tspan>
      <tspan x="20" dy="22">permissions with just-in-time access</tspan>
      <tspan x="20" dy="22">controls. Implement least-privilege</tspan>
      <tspan x="20" dy="22">principles for all autonomous operations</tspan>
      <tspan x="20" dy="22">and enforce granular scope limitations.</tspan>
    </text>
    <rect x="20" y="245" width="100" height="24" rx="12" fill="#a855f720" stroke="#a855f7" stroke-width="1"/>
    <text x="70" y="261" font-family="system-ui, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle">Least Privilege</text>
  </g>
  
  <!-- Card 2: Defense in depth -->
  <g transform="translate(480, 130)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="28" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <path d="M 50 30 L 35 40 L 35 55 C 35 65 50 75 50 75 C 50 75 65 65 65 55 L 65 40 Z" stroke="#00e0ff" stroke-width="2" fill="none" stroke-linejoin="round"/>
    <path d="M 43 52 L 48 57 L 58 47" stroke="#00e0ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#00e0ff" font-weight="bold">PRINCIPLE 2</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Defense in Depth</text>
    <text x="20" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Defense in depth must span input</tspan>
      <tspan x="20" dy="22">validation, tool invocation sandboxing,</tspan>
      <tspan x="20" dy="22">and output filtering. Layer multiple</tspan>
      <tspan x="20" dy="22">security controls at every interaction</tspan>
      <tspan x="20" dy="22">point within the AI pipeline.</tspan>
    </text>
    <rect x="20" y="245" width="90" height="24" rx="12" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1"/>
    <text x="65" y="261" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff" text-anchor="middle">Layered</text>
  </g>
  
  <!-- Card 3: Trust boundaries -->
  <g transform="translate(40, 470)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad2)" stroke="#00e0ff" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="28" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <rect x="35" y="35" width="12" height="30" rx="2" stroke="#00e0ff" stroke-width="2" fill="none"/>
    <rect x="53" y="35" width="12" height="30" rx="2" stroke="#00e0ff" stroke-width="2" fill="none"/>
    <path d="M 41 50 L 59 50 M 50 43 L 50 57" stroke="#00e0ff" stroke-width="2" stroke-linecap="round"/>
    <text x="90" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#00e0ff" font-weight="bold">PRINCIPLE 3</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Explicit Trust Boundaries</text>
    <text x="20" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Multi-agent architectures demand</tspan>
      <tspan x="20" dy="22">explicit trust boundaries with verified</tspan>
      <tspan x="20" dy="22">inter-agent communication. Establish</tspan>
      <tspan x="20" dy="22">clear security zones and authentication</tspan>
      <tspan x="20" dy="22">between all collaborative AI agents.</tspan>
    </text>
    <rect x="20" y="245" width="85" height="24" rx="12" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1"/>
    <text x="62" y="261" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff" text-anchor="middle">Zero Trust</text>
  </g>
  
  <!-- Card 4: Human oversight -->
  <g transform="translate(480, 470)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#grad1)" stroke="#a855f7" stroke-width="2" filter="url(#glow1)"/>
    <circle cx="50" cy="50" r="28" fill="none" stroke="#a855f7" stroke-width="2"/>
    <circle cx="50" cy="42" r="8" stroke="#a855f7" stroke-width="2" fill="none"/>
    <path d="M 35 68 C 35 58 42 52 50 52 C 58 52 65 58 65 68" stroke="#a855f7" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 68 35 L 72 35 L 72 38" stroke="#a855f7" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="90" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#a855f7" font-weight="bold">PRINCIPLE 4</text>
    <text x="20" y="100" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Risk-Tiered Human Oversight</text>
    <text x="20" y="135" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Human oversight should be risk-tiered</tspan>
      <tspan x="20" dy="22">with automated circuit breakers for</tspan>
      <tspan x="20" dy="22">high-impact actions. Configure escalation</tspan>
      <tspan x="20" dy="22">paths based on operation sensitivity</tspan>
      <tspan x="20" dy="22">and potential business impact.</tspan>
    </text>
    <rect x="20" y="245" width="110" height="24" rx="12" fill="#a855f720" stroke="#a855f7" stroke-width="1"/>
    <text x="75" y="261" font-family="system-ui, sans-serif" font-size="11" fill="#a855f7" text-anchor="middle">Circuit Breakers</text>
  </g>
  
  <!-- Central connecting element -->
  <circle cx="450" cy="490" r="25" fill="#05020d" stroke="#a855f7" stroke-width="2" filter="url(#glow2)"/>
  <path d="M 440 490 L 445 485 L 455 495 L 460 490" stroke="#00e0ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 450 480 L 450 500" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Tag pills at bottom -->
  <g transform="translate(450, 820)">
    <rect x="-220" y="0" width="140" height="32" rx="16" fill="#a855f720" stroke="#a855f7" stroke-width="1"/>
    <text x="-150" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#a855f7" text-anchor="middle">Agentic AI Security</text>
    
    <rect x="-65" y="0" width="110" height="32" rx="16" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1"/>
    <text x="-10" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#00e0ff" text-anchor="middle">AI Governance</text>
    
    <rect x="60" y="0" width="120" height="32" rx="16" fill="#a855f720" stroke="#a855f7" stroke-width="1"/>
    <text x="120" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#a855f7" text-anchor="middle">Azure OpenAI</text>
  </g>
  
  <!-- Decorative corner elements -->
  <path d="M 20 20 L 60 20 M 20 20 L 20 60" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
  <path d="M 880 20 L 840 20 M 880 20 L 880 60" stroke="#00e0ff" stroke-width="2" opacity="0.5"/>
  <path d="M 20 880 L 60 880 M 20 880 L 20 840" stroke="#00e0ff" stroke-width="2" opacity="0.5"/>
  <path d="M 880 880 L 840 880 M 880 880 L 880 840" stroke="#a855f7" stroke-width="2" opacity="0.5"/>
</svg>