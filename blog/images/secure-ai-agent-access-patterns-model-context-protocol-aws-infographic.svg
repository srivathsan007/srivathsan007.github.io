<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#050d1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00e0ff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="900" fill="#020510"/>
  
  <circle cx="100" cy="150" r="200" fill="#3b82f6" opacity="0.03"/>
  <circle cx="800" cy="750" r="250" fill="#00e0ff" opacity="0.03"/>
  
  <text x="450" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">Secure AI Agent Access Patterns Using</text>
  <text x="450" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">Model Context Protocol on AWS</text>
  <text x="450" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#00e0ff" text-anchor="middle" filter="url(#glow)">A Zero Trust Blueprint</text>
  
  <g transform="translate(65, 150)">
    <rect x="0" y="0" width="350" height="280" rx="16" fill="url(#cardGrad1)" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="45" cy="45" r="28" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <path d="M35 45 L40 50 L55 35" stroke="#00e0ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M45 25 L45 20 M45 70 L45 65 M25 45 L20 45 M70 45 L65 45" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <text x="85" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#3b82f6" font-weight="bold">01</text>
    <text x="85" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" font-weight="bold">Short-Lived Credentials</text>
    <text x="20" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Implement short-lived, scoped</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">credentials for AI agents using</text>
    <text x="20" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">AWS STS and IAM Roles.</text>
    <rect x="20" y="165" width="310" height="95" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <text x="30" y="185" font-family="monospace" font-size="10" fill="#00e0ff">AssumeRole → Temporary Token</text>
    <text x="30" y="205" font-family="monospace" font-size="10" fill="#94a3b8">├─ MaxSessionDuration: 1hr</text>
    <text x="30" y="225" font-family="monospace" font-size="10" fill="#94a3b8">├─ Scoped to specific actions</text>
    <text x="30" y="245" font-family="monospace" font-size="10" fill="#94a3b8">└─ Auto-rotation enabled</text>
  </g>
  
  <g transform="translate(485, 150)">
    <rect x="0" y="0" width="350" height="280" rx="16" fill="url(#cardGrad1)" stroke="#00e0ff" stroke-width="2" filter="url(#glow)"/>
    <rect x="25" y="25" width="40" height="45" rx="4" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <path d="M35 35 L55 35 M35 45 L50 45 M35 55 L55 55" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <path d="M60 60 L70 70 L60 80" stroke="#00e0ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="85" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#00e0ff" font-weight="bold">02</text>
    <text x="85" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" font-weight="bold">Policy-as-Code Auth</text>
    <text x="20" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Deploy policy-as-code authorization</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">using OPA or AWS Cedar to enforce</text>
    <text x="20" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">fine-grained access controls.</text>
    <rect x="20" y="165" width="310" height="95" rx="8" fill="#0a1628" stroke="#00e0ff" stroke-width="1" opacity="0.6"/>
    <text x="30" y="185" font-family="monospace" font-size="10" fill="#00e0ff">permit(principal, action, resource)</text>
    <text x="30" y="205" font-family="monospace" font-size="10" fill="#94a3b8">when { context.mcp_verified }</text>
    <text x="30" y="225" font-family="monospace" font-size="10" fill="#94a3b8">unless { resource.sensitive }</text>
    <text x="30" y="245" font-family="monospace" font-size="10" fill="#94a3b8">&amp;&amp; !principal.elevated_trust</text>
  </g>
  
  <g transform="translate(65, 470)">
    <rect x="0" y="0" width="350" height="280" rx="16" fill="url(#cardGrad1)" stroke="#00e0ff" stroke-width="2" filter="url(#glow)"/>
    <path d="M45 25 L45 70" stroke="#00e0ff" stroke-width="2"/>
    <path d="M25 45 L65 45" stroke="#00e0ff" stroke-width="2"/>
    <circle cx="45" cy="45" r="20" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M35 35 L55 55 M55 35 L35 55" stroke="#00e0ff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <text x="85" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#00e0ff" font-weight="bold">03</text>
    <text x="85" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" font-weight="bold">Runtime Guardrails</text>
    <text x="20" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Establish runtime guardrails including</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">input validation, output filtering,</text>
    <text x="20" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">and rate limiting protections.</text>
    <rect x="20" y="165" width="310" height="95" rx="8" fill="#0a1628" stroke="#00e0ff" stroke-width="1" opacity="0.6"/>
    <text x="30" y="185" font-family="monospace" font-size="10" fill="#00e0ff">Guardrail Pipeline:</text>
    <text x="30" y="205" font-family="monospace" font-size="10" fill="#94a3b8">→ Input sanitization</text>
    <text x="30" y="225" font-family="monospace" font-size="10" fill="#94a3b8">→ PII detection &amp; masking</text>
    <text x="30" y="245" font-family="monospace" font-size="10" fill="#94a3b8">→ Token rate limiting (1000/min)</text>
  </g>
  
  <g transform="translate(485, 470)">
    <rect x="0" y="0" width="350" height="280" rx="16" fill="url(#cardGrad1)" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <rect x="25" y="25" width="45" height="35" rx="3" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M30 35 L65 35 M30 45 L55 45 M30 55 L60 55" stroke="#00e0ff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="55" cy="65" r="8" fill="#3b82f6" opacity="0.3"/>
    <path d="M52 65 L55 68 L62 61" stroke="#00e0ff" stroke-width="1.5" fill="none"/>
    <text x="85" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#3b82f6" font-weight="bold">04</text>
    <text x="85" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" font-weight="bold">Comprehensive Observability</text>
    <text x="20" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Maintain comprehensive observability</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">through structured logging, tracing,</text>
    <text x="20" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">and security event monitoring.</text>
    <rect x="20" y="165" width="310" height="95" rx="8" fill="#0a1628" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <text x="30" y="185" font-family="monospace" font-size="10" fill="#00e0ff">CloudWatch + X-Ray + Security Hub</text>
    <text x="30" y="205" font-family="monospace" font-size="10" fill="#94a3b8">├─ Request/Response audit logs</text>
    <text x="30" y="225" font-family="monospace" font-size="10" fill="#94a3b8">├─ Distributed tracing enabled</text>
    <text x="30" y="245" font-family="monospace" font-size="10" fill="#94a3b8">└─ Anomaly detection alerts</text>
  </g>
  
  <path d="M415 290 L485 290" stroke="url(#arrowGrad)" stroke-width="2" fill="none" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  <path d="M240 430 L240 470" stroke="url(#arrowGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M660 430 L660 470" stroke="url(#arrowGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M415 610 L485 610" stroke="url(#arrowGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  
  <circle cx="415" cy="290" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="485" cy="290" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="240" cy="430" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="240" cy="470" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="660" cy="430" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="660" cy="470" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="415" cy="610" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="485" cy="610" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  
  <path d="M450 380 L450 520" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  
  <g transform="translate(450, 800)">
    <rect x="-150" y="0" width="95" height="28" rx="14" fill="#0a1628" stroke="#3b82f6" stroke-width="1" filter="url(#glow)"/>
    <text x="-102" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">AI Security</text>
    
    <rect x="-45" y="0" width="60" height="28" rx="14" fill="#0a1628" stroke="#00e0ff" stroke-width="1" filter="url(#glow)"/>
    <text x="-15" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#00e0ff" text-anchor="middle">AWS</text>
    
    <rect x="25" y="0" width="180" height="28" rx="14" fill="#0a1628" stroke="#3b82f6" stroke-width="1" filter="url(#glow)"/>
    <text x="115" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">Model Context Protocol</text>
  </g>
  
  <text x="450" y="865" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Zero Trust Architecture · Defense in Depth · Least Privilege Access</text>
  
  <circle cx="50" cy="50" r="2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="850" cy="100" r="2" fill="#00e0ff" opacity="0.5"/>
  <circle cx="100" cy="850" r="2" fill="#00e0ff" opacity="0.5"/>
  <circle cx="800" cy="50" r="2" fill="#3b82f6" opacity="0.5"/>
