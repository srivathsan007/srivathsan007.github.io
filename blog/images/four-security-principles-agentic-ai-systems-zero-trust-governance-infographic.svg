<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#051020;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00e0ff;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="900" fill="#020510"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2744" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="900" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="white">Four Security Principles for Agentic AI Systems</text>
  <text x="450" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748b">A Cloud Architect's Guide to Zero Trust AI Governance</text>
  
  <!-- Connecting arrows -->
  <path d="M 420 320 L 480 320" stroke="url(#arrowGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <polygon points="478,316 486,320 478,324" fill="#00e0ff"/>
  
  <path d="M 420 580 L 480 580" stroke="url(#arrowGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <polygon points="478,576 486,580 478,584" fill="#00e0ff"/>
  
  <path d="M 230 420 L 230 480" stroke="url(#arrowGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <polygon points="226,478 230,486 234,478" fill="#00e0ff"/>
  
  <path d="M 670 420 L 670 480" stroke="url(#arrowGrad)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <polygon points="666,478 670,486 674,478" fill="#00e0ff"/>
  
  <!-- Card 1: Zero Trust -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#cardGrad1)" stroke="#3b82f6" stroke-width="2" filter="url(#glowStrong)"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M50 30 L50 50 L65 60" stroke="#00e0ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M35 45 L50 35 L65 45 L65 65 L35 65 Z" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#00e0ff" font-weight="600">PRINCIPLE 1</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Zero Trust Architecture</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Agentic AI requires Zero Trust architecture</tspan>
      <tspan x="20" dy="22">where every agent interaction must be verified,</tspan>
      <tspan x="20" dy="22">authenticated, and authorized regardless of</tspan>
      <tspan x="20" dy="22">origin. Never trust, always verify each request</tspan>
      <tspan x="20" dy="22">and response in the agent communication chain.</tspan>
    </text>
    <rect x="20" y="235" width="80" height="24" rx="12" fill="#3b82f620" stroke="#3b82f6" stroke-width="1"/>
    <text x="60" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">VERIFY</text>
    <rect x="110" y="235" width="100" height="24" rx="12" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1"/>
    <text x="160" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff">AUTHENTICATE</text>
  </g>
  
  <!-- Card 2: Least Privilege -->
  <g transform="translate(480, 120)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#cardGrad1)" stroke="#00e0ff" stroke-width="2" filter="url(#glowStrong)"/>
    <rect x="35" y="25" r="25" width="30" height="40" rx="4" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <circle cx="50" cy="38" r="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M40 50 L60 50 L60 62 L40 62 Z" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#00e0ff" font-weight="600">PRINCIPLE 2</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Dynamic Least Privilege</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Least privilege must extend beyond traditional</tspan>
      <tspan x="20" dy="22">RBAC to include dynamic, context-aware</tspan>
      <tspan x="20" dy="22">permissions. AI agents should receive only</tspan>
      <tspan x="20" dy="22">the minimum access required for each specific</tspan>
      <tspan x="20" dy="22">task, with real-time scope adjustments.</tspan>
    </text>
    <rect x="20" y="235" width="70" height="24" rx="12" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1"/>
    <text x="55" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff">RBAC+</text>
    <rect x="100" y="235" width="90" height="24" rx="12" fill="#3b82f620" stroke="#3b82f6" stroke-width="1"/>
    <text x="145" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">DYNAMIC</text>
  </g>
  
  <!-- Card 3: Human-in-the-Loop -->
  <g transform="translate(40, 440)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#cardGrad1)" stroke="#00e0ff" stroke-width="2" filter="url(#glowStrong)"/>
    <circle cx="50" cy="45" r="15" fill="none" stroke="#00e0ff" stroke-width="2"/>
    <path d="M50 60 L50 85 M35 70 L65 70 M40 100 L50 85 L60 100" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#00e0ff" font-weight="600">PRINCIPLE 3</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Human-in-the-Loop Controls</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Human-in-the-loop controls should be risk-</tspan>
      <tspan x="20" dy="22">based, with tiered approval workflows that</tspan>
      <tspan x="20" dy="22">scale intervention based on action severity.</tspan>
      <tspan x="20" dy="22">Critical operations require explicit human</tspan>
      <tspan x="20" dy="22">approval before agent execution proceeds.</tspan>
    </text>
    <rect x="20" y="235" width="90" height="24" rx="12" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1"/>
    <text x="65" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff">RISK-BASED</text>
    <rect x="120" y="235" width="80" height="24" rx="12" fill="#3b82f620" stroke="#3b82f6" stroke-width="1"/>
    <text x="160" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">TIERED</text>
  </g>
  
  <!-- Card 4: Observability -->
  <g transform="translate(480, 440)">
    <rect x="0" y="0" width="380" height="280" rx="16" fill="url(#cardGrad1)" stroke="#3b82f6" stroke-width="2" filter="url(#glowStrong)"/>
    <path d="M30 65 L45 45 L60 55 L75 35" stroke="#00e0ff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="30" cy="65" r="3" fill="#3b82f6"/>
    <circle cx="45" cy="45" r="3" fill="#3b82f6"/>
    <circle cx="60" cy="55" r="3" fill="#3b82f6"/>
    <circle cx="75" cy="35" r="3" fill="#00e0ff"/>
    <text x="95" y="45" font-family="system-ui, sans-serif" font-size="13" fill="#00e0ff" font-weight="600">PRINCIPLE 4</text>
    <text x="95" y="65" font-family="system-ui, sans-serif" font-size="18" fill="white" font-weight="bold">Comprehensive Observability</text>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">
      <tspan x="20" dy="0">Comprehensive observability capturing</tspan>
      <tspan x="20" dy="22">complete reasoning chains, decision paths,</tspan>
      <tspan x="20" dy="22">and action outcomes. Full audit trails enable</tspan>
      <tspan x="20" dy="22">forensic analysis and ensure accountability</tspan>
      <tspan x="20" dy="22">across all AI agent operations.</tspan>
    </text>
    <rect x="20" y="235" width="70" height="24" rx="12" fill="#3b82f620" stroke="#3b82f6" stroke-width="1"/>
    <text x="55" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6">AUDIT</text>
    <rect x="100" y="235" width="80" height="24" rx="12" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1"/>
    <text x="140" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#00e0ff">TRACE</text>
  </g>
  
  <!-- Central connection hub -->
  <circle cx="450" cy="450" r="25" fill="#020510" stroke="#3b82f6" stroke-width="2" filter="url(#glowStrong)"/>
  <path d="M440 450 L445 455 L460 440" stroke="#00e0ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Tag pills at bottom -->
  <g transform="translate(450, 800)">
    <rect x="-280" y="0" width="160" height="32" rx="16" fill="#3b82f620" stroke="#3b82f6" stroke-width="1" filter="url(#glow)"/>
    <text x="-200" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6" font-weight="500">Agentic AI Security</text>
    
    <rect x="-100" y="0" width="200" height="32" rx="16" fill="#00e0ff20" stroke="#00e0ff" stroke-width="1" filter="url(#glow)"/>
    <text x="0" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#00e0ff" font-weight="500">Zero Trust Architecture</text>
    
    <rect x="120" y="0" width="140" height="32" rx="16" fill="#3b82f620" stroke="#3b82f6" stroke-width="1" filter="url(#glow)"/>
    <text x="190" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6" font-weight="500">AI Governance</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="850" r="40" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="50" cy="850" r="60" fill="none" stroke="#00e0ff" stroke-width="0.5" opacity="0.2"/>
  <circle cx="850" cy="850" r="40" fill="none" stroke="#00e0ff" stroke-width="0.5" opacity="0.3"/>
  <circle cx="850" cy="850" r="60" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
</svg>