<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00e0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="900" height="900" fill="#020510"/>
  
  <circle cx="100" cy="100" r="200" fill="#3b82f6" opacity="0.03"/>
  <circle cx="800" cy="800" r="250" fill="#00e0ff" opacity="0.03"/>
  
  <text x="450" y="55" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" text-anchor="middle">Secure AI Agent Access Patterns to AWS Resources</text>
  <text x="450" y="85" fill="#00e0ff" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" text-anchor="middle">Using Model Context Protocol</text>
  
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="370" height="280" rx="16" fill="url(#cardGrad1)" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="30" fill="#3b82f6" opacity="0.2"/>
    <path d="M40 45 L50 35 L60 45 M50 35 V60 M35 55 A20 20 0 1 0 65 55" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" transform="translate(0, 5)"/>
    <text x="90" y="55" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">Zero Trust Authentication</text>
    <text x="20" y="100" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
      <tspan x="20" dy="0">Implement Zero Trust authentication</tspan>
      <tspan x="20" dy="20">for AI agents using short-lived</tspan>
      <tspan x="20" dy="20">credentials and continuous</tspan>
      <tspan x="20" dy="20">verification of identity and context.</tspan>
    </text>
    <rect x="20" y="200" width="80" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="60" y="216" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">STS Tokens</text>
    <rect x="110" y="200" width="100" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="160" y="216" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">IAM Roles</text>
    <rect x="220" y="200" width="80" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="260" y="216" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">MFA</text>
    <text x="350" y="30" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="end">01</text>
  </g>
  
  <g transform="translate(480, 130)">
    <rect x="0" y="0" width="370" height="280" rx="16" fill="url(#cardGrad1)" stroke="#00e0ff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="30" fill="#00e0ff" opacity="0.2"/>
    <path d="M35 40 H65 V65 H35 Z M40 40 V35 A10 10 0 0 1 60 35 V40" stroke="#00e0ff" stroke-width="2.5" fill="none" stroke-linecap="round" transform="translate(0, 5)"/>
    <path d="M50 50 V58 M47 58 H53" stroke="#00e0ff" stroke-width="2.5" fill="none" stroke-linecap="round" transform="translate(0, 5)"/>
    <text x="90" y="55" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">Attribute-Based Access Control</text>
    <text x="20" y="100" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
      <tspan x="20" dy="0">Use ABAC with IAM policy</tspan>
      <tspan x="20" dy="20">conditions to enforce fine-grained</tspan>
      <tspan x="20" dy="20">access based on resource tags,</tspan>
      <tspan x="20" dy="20">session attributes, and context.</tspan>
    </text>
    <rect x="20" y="200" width="100" height="24" rx="4" fill="#00e0ff" opacity="0.2"/>
    <text x="70" y="216" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Policy Conditions</text>
    <rect x="130" y="200" width="80" height="24" rx="4" fill="#00e0ff" opacity="0.2"/>
    <text x="170" y="216" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Resource Tags</text>
    <rect x="220" y="200" width="80" height="24" rx="4" fill="#00e0ff" opacity="0.2"/>
    <text x="260" y="216" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Sessions</text>
    <text x="350" y="30" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="end">02</text>
  </g>
  
  <g transform="translate(50, 460)">
    <rect x="0" y="0" width="370" height="280" rx="16" fill="url(#cardGrad1)" stroke="#00e0ff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="30" fill="#00e0ff" opacity="0.2"/>
    <rect x="30" y="35" width="40" height="35" rx="3" stroke="#00e0ff" stroke-width="2.5" fill="none"/>
    <path d="M35 45 H65 M35 55 H55 M40 70 V80 M60 70 V80 M35 80 H45 M55 80 H65" stroke="#00e0ff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="90" y="55" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">Private VPC Deployment</text>
    <text x="20" y="100" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
      <tspan x="20" dy="0">Deploy MCP servers in private VPC</tspan>
      <tspan x="20" dy="20">subnets with VPC endpoints for</tspan>
      <tspan x="20" dy="20">secure, isolated network access</tspan>
      <tspan x="20" dy="20">to AWS services.</tspan>
    </text>
    <rect x="20" y="200" width="100" height="24" rx="4" fill="#00e0ff" opacity="0.2"/>
    <text x="70" y="216" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Private Subnets</text>
    <rect x="130" y="200" width="100" height="24" rx="4" fill="#00e0ff" opacity="0.2"/>
    <text x="180" y="216" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">VPC Endpoints</text>
    <rect x="240" y="200" width="80" height="24" rx="4" fill="#00e0ff" opacity="0.2"/>
    <text x="280" y="216" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">NAT GW</text>
    <text x="350" y="30" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="end">03</text>
  </g>
  
  <g transform="translate(480, 460)">
    <rect x="0" y="0" width="370" height="280" rx="16" fill="url(#cardGrad1)" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="30" fill="#3b82f6" opacity="0.2"/>
    <path d="M35 35 H55 L65 45 V70 H35 Z M55 35 V45 H65" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 52 H58 M42 58 H58 M42 64 H52" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="90" y="55" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">Comprehensive Audit Logging</text>
    <text x="20" y="100" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
      <tspan x="20" dy="0">Enable comprehensive audit logging</tspan>
      <tspan x="20" dy="20">with CloudTrail data events for</tspan>
      <tspan x="20" dy="20">complete visibility into AI agent</tspan>
      <tspan x="20" dy="20">activities and API calls.</tspan>
    </text>
    <rect x="20" y="200" width="80" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="60" y="216" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">CloudTrail</text>
    <rect x="110" y="200" width="100" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="160" y="216" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">Data Events</text>
    <rect x="220" y="200" width="100" height="24" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="270" y="216" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">CloudWatch</text>
    <text x="350" y="30" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="end">04</text>
  </g>
  
  <path d="M420 270 L480 270" stroke="url(#arrowGrad)" stroke-width="3" fill="none" marker-end="url(#arrowhead)" filter="url(#glow)"/>
  <path d="M235 410 L235 460" stroke="url(#arrowGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M665 410 L665 460" stroke="url(#arrowGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
  <path d="M420 600 L480 600" stroke="url(#arrowGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>
  
  <circle cx="420" cy="270" r="4" fill="#3b82f6" filter="url(#glowStrong)"/>
  <circle cx="480" cy="270" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="235" cy="410" r="4" fill="#3b82f6" filter="url(#glowStrong)"/>
  <circle cx="235" cy="460" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="665" cy="410" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="665" cy="460" r="4" fill="#3b82f6" filter="url(#glowStrong)"/>
  <circle cx="420" cy="600" r="4" fill="#00e0ff" filter="url(#glowStrong)"/>
  <circle cx="480" cy="600" r="4" fill="#3b82f6" filter="url(#glowStrong)"/>
  
  <g transform="translate(450, 820)">
    <rect x="-200" y="0" width="100" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
    <text x="-150" y="21" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">AI Security</text>
    
    <rect x="-80" y="0" width="70" height="32" rx="16" fill="#00e0ff" opacity="0.2" stroke="#00e0ff" stroke-width="1"/>
    <text x="-45" y="21" fill="#00e0ff" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">AWS</text>
    
    <rect x="10" y="0" width="180" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
    <text x="100" y="21" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Model Context Protocol</text>
  </g>
  
  <line x1="50" y1="870" x2="850" y2="870" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <text x="450" y="890" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Enterprise Security Architecture Reference</text>
</svg>