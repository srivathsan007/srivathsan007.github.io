  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060810; --bg2: #0a0c14;
      --surface: rgba(255,255,255,0.025);
      --border: rgba(255,255,255,0.06);
      --text: #b8bcc8; --dim: #5e6374; --bright: #eef0f6;
      --accent: #00e0ff; --accent2: #a855f7;
      --glow: rgba(0,224,255,0.12);
      --grad: linear-gradient(135deg, #00e0ff 0%, #a855f7 100%);
      --green: #10B981;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Libre Baskerville', Georgia, serif; line-height: 1.8; overflow-x: hidden; }
    ::selection { background: rgba(0,224,255,0.2); color: #fff; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(6,8,16,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-mark { width: 36px; height: 36px; border-radius: 9px; background: var(--grad); display: flex; align-items: center; justify-content: center; font: 700 13px 'Fira Code', monospace; color: #000; box-shadow: 0 0 16px var(--glow); }
    .nav-brand { font: 800 18px 'Playfair Display', serif; color: var(--bright); font-style: italic; }
    .back-link { font: 500 11px 'Space Grotesk', sans-serif; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.3s; }
    .back-link:hover { color: var(--accent); }
    .hero-wrap { width: 100%; height: 460px; overflow: hidden; position: relative; }
    .hero-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-wrap::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(6,8,16,0.1) 0%, rgba(6,8,16,0.5) 60%, rgba(6,8,16,0.95) 100%); }
    article { max-width: 800px; margin: 0 auto; padding: 3rem 2rem 8rem; }
    .post-meta { font: 400 11px 'Fira Code', monospace; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; }
    h1 { font: 700 clamp(1.8rem, 4vw, 3rem) 'Space Grotesk', sans-serif; line-height: 1.15; color: var(--bright); margin-bottom: 1.25rem; letter-spacing: -0.03em; }
    .excerpt { font: 400 1rem 'Libre Baskerville', serif; line-height: 1.9; color: var(--dim); margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 3rem; }
    .tag { font: 400 10px 'Fira Code', monospace; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 12px; background: var(--surface); color: var(--dim); border: 1px solid var(--border); border-radius: 20px; }
    .blog-section { margin-bottom: 3.5rem; }
    .blog-section h2 { font: 700 1.3rem 'Space Grotesk', sans-serif; color: var(--bright); margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); letter-spacing: -0.02em; }
    .section-body p { font: 400 0.95rem 'Libre Baskerville', serif; line-height: 2; color: var(--text); margin-bottom: 1.25rem; }
    .section-body strong { color: var(--bright); font-weight: 700; }
    .section-body em { color: var(--accent); font-style: normal; }
    .section-body code { font: 400 0.8rem 'Fira Code', monospace; background: rgba(0,224,255,0.06); color: var(--accent); padding: 2px 8px; border-radius: 4px; border: 1px solid rgba(0,224,255,0.12); }
    .section-body h3 { font: 600 1.05rem 'Space Grotesk', sans-serif; color: var(--bright); margin: 2rem 0 0.75rem; }
    .section-body ul { padding-left: 1.5rem; margin-bottom: 1.25rem; }
    .section-body li { font: 400 0.92rem 'Libre Baskerville', serif; line-height: 1.9; color: var(--text); margin-bottom: 0.4rem; }
    .infobox { border-left: 2px solid var(--accent); padding: 1.25rem 1.75rem; background: rgba(0,224,255,0.04); margin: 1.5rem 0; border-radius: 0 8px 8px 0; }
    .infobox-title { font: 600 11px 'Fira Code', monospace; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
    .infobox p { font: 400 0.88rem 'Libre Baskerville', serif; line-height: 1.85; color: var(--dim); margin: 0; }
    .blog-infographic { margin: 2.5rem 0; padding: 2rem; background: var(--bg2); border: 1px solid var(--border); border-left: 2px solid var(--accent2); border-radius: 0 12px 12px 0; }
    .infographic-wrap { width: 100%; overflow-x: auto; }
    .infographic-wrap svg { width: 100%; height: auto; max-width: 100%; }
    .blog-diagram { margin: 2.5rem 0; padding: 2rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; }
    .diagram-label { font: 400 11px 'Fira Code', monospace; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 1.5rem; }
    .mermaid { background: transparent; }
    .key-takeaways { background: var(--bg2); border: 1px solid var(--border); border-left: 2px solid var(--green); padding: 2.5rem; margin: 3rem 0; border-radius: 0 12px 12px 0; }
    .key-takeaways h3 { font: 600 11px 'Fira Code', monospace; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green); margin-bottom: 1.5rem; }
    .key-takeaways ul { list-style: none; padding: 0; }
    .key-takeaways li { font: 400 0.92rem 'Libre Baskerville', serif; line-height: 1.9; color: var(--text); padding: 0.6rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 0.75rem; align-items: flex-start; }
    .key-takeaways li:last-child { border-bottom: none; }
    .arrow { color: var(--green); flex-shrink: 0; font-weight: 700; }
    .view-counter { text-align: center; margin: 2rem 0; padding: 0.75rem; border-top: 1px solid rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .view-counter span { font: 400 11px 'Fira Code', monospace; color: var(--dim); letter-spacing: 0.15em; }
    .post-footer { margin-top: 4rem; padding-top: 2.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .author-name { font: 700 1rem 'Space Grotesk', sans-serif; color: var(--bright); margin-bottom: 4px; }
    .author-title { font: 400 12px 'Fira Code', monospace; color: var(--dim); }
    .linkedin-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--grad); color: #000; padding: 12px 24px; border-radius: 10px; text-decoration: none; font: 600 13px 'Space Grotesk', sans-serif; box-shadow: 0 0 20px var(--glow); transition: all 0.3s; }
    .linkedin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--glow); }
    .back-to-top { display: block; text-align: center; margin-top: 3rem; padding: 1rem; font: 400 11px 'Fira Code', monospace; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.3s; border-top: 1px solid var(--border); }
    .back-to-top:hover { color: var(--accent); }
    @media (max-width: 700px) {
      nav { padding: 1rem 1.25rem; }
      .nav-brand { display: none; }
      article { padding: 2rem 1.25rem 5rem; }
      .hero-wrap { height: 240px; }
      .post-footer { flex-direction: column; }
    }
  </style>

  <script>
    mermaid.initialize({
      startOnLoad: true, theme: 'dark',
      themeVariables: {
        background: '#0a0c14', primaryColor: '#0a0c14',
        primaryTextColor: '#eef0f6',
        primaryBorderColor: 'rgba(255,255,255,0.06)',
        lineColor: '#5e6374', secondaryColor: '#060810',
        tertiaryColor: '#060810', fontSize: '13px'
      }
    });

    // Page view counter — uses dashboard Redis via Vercel API
    (async function() {
      const slug = 'test';
      const el = document.getElementById('view-count');
      try {
        const res = await fetch(
          'https://linkedin-dashboard-nu-nine.vercel.app/api/views/' + slug,
          { method: 'POST' }
        );
        const data = await res.json();
        if (el && data.views) {
          el.textContent = '// ' + data.views.toLocaleString() + ' views';
        } else if (el) {
          el.textContent = '';
        }
      } catch(e) {
        if (el) el.textContent = '';
      }
    })();
  </script>
